naftiko: 1.0.0-alpha2
info:
  label: Google Cloud Translation API
  description: The Google Cloud Translation API provides programmatic access to Google's neural machine translation technology.
    It enables developers to dynamically translate text between thousands of language pairs, detect the language of source
    text, and retrieve a list of supported languages. The API supports both basic (v2) and advanced (v3) translation capabilities
    including batch translation, custom models, and glossaries.
  tags:
  - Google
  - Translate
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: google-translate
    baseUri: https://translation.googleapis.com
    description: Google Cloud Translation API HTTP API.
    resources:
    - name: language-translate-v2
      path: /language/translate/v2
      operations:
      - name: translatetext
        method: POST
        description: Google Cloud Translation API Translate Text
        inputParameters:
        - name: key
          in: query
          type: string
          required: true
          description: API key for authentication
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: language-translate-v2-detect
      path: /language/translate/v2/detect
      operations:
      - name: detectlanguage
        method: POST
        description: Google Cloud Translation API Detect Language
        inputParameters:
        - name: key
          in: query
          type: string
          required: true
          description: API key for authentication
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: language-translate-v2-languages
      path: /language/translate/v2/languages
      operations:
      - name: listlanguages
        method: GET
        description: Google Cloud Translation API List Supported Languages
        inputParameters:
        - name: key
          in: query
          type: string
          required: true
          description: API key for authentication
        - name: target
          in: query
          type: string
          description: The language to use to return localized, human readable names of supported languages.
        - name: model
          in: query
          type: string
          description: The translation model. Can be either base for the Phrase-Based Machine Translation model, or nmt for
            the Neural Machine Translation model.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: google-translate-rest
    description: REST adapter for Google Cloud Translation API.
    resources:
    - path: /language/translate/v2
      name: translatetext
      operations:
      - method: POST
        name: translatetext
        description: Google Cloud Translation API Translate Text
        call: google-translate.translatetext
        outputParameters:
        - type: object
          mapping: $.
    - path: /language/translate/v2/detect
      name: detectlanguage
      operations:
      - method: POST
        name: detectlanguage
        description: Google Cloud Translation API Detect Language
        call: google-translate.detectlanguage
        outputParameters:
        - type: object
          mapping: $.
    - path: /language/translate/v2/languages
      name: listlanguages
      operations:
      - method: GET
        name: listlanguages
        description: Google Cloud Translation API List Supported Languages
        call: google-translate.listlanguages
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: google-translate-mcp
    transport: http
    description: MCP adapter for Google Cloud Translation API for AI agent use.
    tools:
    - name: translatetext
      description: Google Cloud Translation API Translate Text
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-translate.translatetext
      with:
        key: tools.key
      inputParameters:
      - name: key
        type: string
        description: API key for authentication
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: detectlanguage
      description: Google Cloud Translation API Detect Language
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-translate.detectlanguage
      with:
        key: tools.key
      inputParameters:
      - name: key
        type: string
        description: API key for authentication
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: listlanguages
      description: Google Cloud Translation API List Supported Languages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: google-translate.listlanguages
      with:
        key: tools.key
        target: tools.target
        model: tools.model
      inputParameters:
      - name: key
        type: string
        description: API key for authentication
        required: true
      - name: target
        type: string
        description: The language to use to return localized, human readable names of supported languages.
      - name: model
        type: string
        description: The translation model. Can be either base for the Phrase-Based Machine Translation model, or nmt for
          the Neural Machine Translation model.
      outputParameters:
      - type: object
        mapping: $.
