naftiko: 1.0.0-alpha2
info:
  label: Google Cloud Translation API — Languages
  description: 'Google Cloud Translation API — Languages. 1 operations. Lead operation: Google Cloud Translation API List
    Supported Languages. Self-contained Naftiko capability covering one Google Translate business surface.'
  tags:
  - Google Translate
  - Languages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_TRANSLATE_API_KEY: GOOGLE_TRANSLATE_API_KEY
capability:
  consumes:
  - type: http
    namespace: openapi-languages
    baseUri: https://translation.googleapis.com
    description: Google Cloud Translation API — Languages business capability. Self-contained, no shared references.
    resources:
    - name: language-translate-v2-languages
      path: /language/translate/v2/languages
      operations:
      - name: listlanguages
        method: GET
        description: Google Cloud Translation API List Supported Languages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: query
          type: string
          description: API key for authentication
          required: true
        - name: target
          in: query
          type: string
          description: The language to use to return localized, human readable names of supported languages.
        - name: model
          in: query
          type: string
          description: The translation model. Can be either base for the Phrase-Based Machine Translation model, or nmt for
            the Neural Machine Translation model.
  exposes:
  - type: rest
    namespace: openapi-languages-rest
    port: 8080
    description: REST adapter for Google Cloud Translation API — Languages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/language/translate/v2/languages
      name: language-translate-v2-languages
      description: REST surface for language-translate-v2-languages.
      operations:
      - method: GET
        name: listlanguages
        description: Google Cloud Translation API List Supported Languages
        call: openapi-languages.listlanguages
        with:
          key: rest.key
          target: rest.target
          model: rest.model
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openapi-languages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Cloud Translation API — Languages. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: google-cloud-translation-api-list
      description: Google Cloud Translation API List Supported Languages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openapi-languages.listlanguages
      with:
        key: tools.key
        target: tools.target
        model: tools.model
      outputParameters:
      - type: object
        mapping: $.
