aid: google-translate
name: Google Cloud Translation API
description: >-
  The Google Cloud Translation API provides programmatic access to Google's neural machine translation technology. It
  enables developers to dynamically translate text between thousands of language pairs, detect the source language of
  text, and retrieve lists of supported languages. The API supports both basic (v2) and advanced (v3) translation
  capabilities including batch translation, custom models, glossaries, and adaptive translation.
